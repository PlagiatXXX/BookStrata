services:
  postgres:
    image: postgres:16-alpine
    container_name: bookstrata-postgres
    environment:
      POSTGRES_USER: bookstrata
      POSTGRES_PASSWORD: bookstrata_pass
      POSTGRES_DB: bookstrata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstrata"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    container_name: bookstrata-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
