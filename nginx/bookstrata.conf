# ============================================================
# BookStrata — Nginx config
# ============================================================
# Куда положить:
#   sudo ln -s /etc/nginx/sites-available/bookstrata.conf /etc/nginx/sites-enabled/
#
# Проверить:  sudo nginx -t
# Применить:  sudo systemctl reload nginx
#
# Если ставишь nginx в Docker — монтируй в /etc/nginx/conf.d/default.conf
# ============================================================

upstream backend {
    # Если бэкенд в Docker-контейнере — укажи имя контейнера:
    # server app:8080;
    # Если на хосте:
    server 127.0.0.1:8080;
}

# ———— HTTP → HTTPS принудительный редирект ————
server {
    listen 80;
    server_name bookstrata.ru www.bookstrata.ru;
    return 301 https://$host$request_uri;
}

# ———— HTTPS ————
server {
    listen 443 ssl http2;
    server_name bookstrata.ru www.bookstrata.ru;

    # SSL-сертификаты (заполнить после получения)
    # ssl_certificate     /etc/nginx/ssl/bookstrata.ru/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/bookstrata.ru/privkey.pem;

    # ——— Базовая безопасность ———
    # Запрещаем показ версии nginx
    server_tokens off;

    # ——— Лимиты ———
    # Максимальный размер тела запроса (для загрузки обложек)
    client_max_body_size 15M;

    # ——— Статика (собранный фронтенд) ———
    root /var/www/bookstrata/dist;
    index index.html;

    # Кэширование статики (бандлы с хешем в имени)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Изображения (загруженные пользователями, не из Cloudinary)
    location /uploads/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Sitemap + robots отдаём из статики
    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public";
    }

    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
    }

    # ——— SPA fallback ———
    # Все нестатичные пути → index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ——— API-прокси на бэкенд ———
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ——— Swagger-документация ———
    location /documentation/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ——— Health check (без логирования) ———
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # ——— Логи ———
    access_log /var/log/nginx/bookstrata-access.log;
    error_log  /var/log/nginx/bookstrata-error.log warn;
}
