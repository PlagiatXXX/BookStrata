# ============================================================
# BookStrata — Nginx config (HTTP only, без SSL)
# ============================================================
# Когда появится SSL — заменить на полную версию с HTTPS
# ============================================================

upstream backend {
    # Бэкенд в Docker-контейнере
    server app:8080;
}

server {
    listen 80;
    server_name bookstrata.ru www.bookstrata.ru;

    server_tokens off;
    client_max_body_size 15M;

    # Статика (собранный фронтенд)
    root /usr/share/nginx/html;
    index index.html;

    # Кэширование статики
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /uploads/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public";
    }

    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API-прокси на бэкенд
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Swagger-документация
    location /documentation/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        access_log off;
    }

    access_log /var/log/nginx/bookstrata-access.log;
    error_log  /var/log/nginx/bookstrata-error.log warn;
}
