# ============================================================
# BookStrata — Nginx config (production, HTTPS)
# ============================================================
# Auto-renewal: certbot renew
# ============================================================

upstream backend {
    # Бэкенд в Docker-контейнере
    server app:8080;
}

# ———— HTTP → HTTPS принудительный редирект ————
server {
    listen 80;
    server_name bookstrata.ru www.bookstrata.ru;
    return 301 https://$host$request_uri;
}

# ———— HTTPS ————
server {
    listen 443 ssl;
    http2 on;
    server_name bookstrata.ru www.bookstrata.ru;

    # SSL-сертификаты
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Базовая безопасность
    server_tokens off;
    client_max_body_size 15M;

    # Настройки SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Статика (собранный фронтенд)
    root /usr/share/nginx/html;
    index index.html;

    # Кэширование статики
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /uploads/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public";
    }

    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API-прокси на бэкенд
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Swagger-документация
    location /documentation/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        access_log off;
    }

    access_log /var/log/nginx/bookstrata-access.log;
    error_log  /var/log/nginx/bookstrata-error.log warn;
}
