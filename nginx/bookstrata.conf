# ============================================================
# BookStrata — Nginx config (production, HTTPS)
# ============================================================
# Auto-renewal: certbot renew
# ============================================================

# Docker DNS resolver для динамического обновления IP upstream
resolver 127.0.0.11 ipv6=off valid=10s;

# Определяем заголовок Connection в зависимости от Upgrade
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       "";
}

# Gzip сжатие для статики и API
gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    image/x-icon
    font/woff
    font/woff2
    application/manifest+json;

upstream backend {
    # Бэкенд в Docker-контейнере
    server app:8080;
    keepalive 32;
}

# ———— HTTP → HTTPS принудительный редирект ————
server {
    listen 80;
    server_name bookstrata.ru www.bookstrata.ru;
    return 301 https://$host$request_uri;
}

# ———— HTTPS ————
server {
    listen 443 ssl;
    http2 on;
    server_name bookstrata.ru www.bookstrata.ru;

    # SSL-сертификаты
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Базовая безопасность
    server_tokens off;
    client_max_body_size 15M;

    # Security-заголовки (default для locations без своего add_header).
    # Locations со своим Cache-Control должны подключать этот snippet явно,
    # т.к. свой add_header сбрасывает наследование.
    include /etc/nginx/snippets/security-headers.conf;

    # Настройки SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Статика (собранный фронтенд)
    root /usr/share/nginx/html;
    index index.html;

    # Кэширование статики (Vite-сборка с хэшами в именах)
    location /assets/ {
        # Fallback на старые чанки (предыдущий dist.old) при деплое
        try_files $uri @old_assets;
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
    }

    # JS/MJS модули — явно указываем MIME тип,
    # чтобы при отсутствии файла nginx не отдавал index.html как JS
    location ~* \.(js|mjs)$ {
        types { } default_type "application/javascript; charset=utf-8";
        try_files $uri @old_assets;
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
    }

    # Fallback на предыдущую сборку (dist.old) — старые JS-чанки
    location @old_assets {
        root /usr/share/nginx/old-assets;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
    }

    # Скриншоты для лендинга
    location /screenshots/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
    }

    # Изображения (webp, png, jpg, svg, ico)
    location ~* \.(webp|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
    }

    # Видео (mp4)
    location ~* \.(mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
    }

    location /uploads/ {
        expires 7d;
        add_header Cache-Control "public";
        include /etc/nginx/snippets/security-headers.conf;
    }

    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public";
        include /etc/nginx/snippets/security-headers.conf;
    }

    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # SPA fallback — index.html не кэшируется, чтобы браузер всегда тянул свежие чанки
    location / {
        try_files $uri $uri/ /index.html;
        # no-cache обязывает ревалидировать на сервере, но max-age=0 нужен
        # по RFC 5861 — без него stale-while-revalidate формально некорректен.
        add_header Cache-Control "no-cache, max-age=0, stale-while-revalidate=60";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # API-прокси на бэкенд (включая WebSocket для live-функций)
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Swagger-документация
    location /documentation/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # Uptime Kuma — мониторинг (отдельный сервис на сервере)
    location /kuma/ {
        proxy_pass http://uptime-kuma:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    access_log /var/log/nginx/bookstrata-access.log;
    error_log  /var/log/nginx/bookstrata-error.log warn;
}
