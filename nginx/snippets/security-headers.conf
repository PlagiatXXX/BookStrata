# ============================================================
# Security-заголовки — общий snippet для всех location
# ============================================================
# Почему include, а не наследование:
# В Nginx, как только в location появляется свой add_header,
# ВСЕ add_header из server-блока перестают наследоваться.
# Поэтому в server мы задаём только default, а в каждом location
# со своим Cache-Control делаем include этого файла — иначе статики
# (JS/изображения/видео/assets) уходила бы без nosniff/HSTS.
# ============================================================

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
