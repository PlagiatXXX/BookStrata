server {
    listen 80;
    server_name status.bookstrata.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name status.bookstrata.ru;

    ssl_certificate     /etc/nginx/ssl/status-fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/status-privkey.pem;

    include /etc/nginx/snippets/security-headers.conf;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 15M;

    location / {
        add_header X-Robots-Tag "noindex, nofollow";
        proxy_pass http://uptime-kuma:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    access_log /var/log/nginx/status-access.log;
    error_log  /var/log/nginx/status-error.log warn;
}
