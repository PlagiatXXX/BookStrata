<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BookStrata — интерактивный рейтинг книг. Составляй топ лучших книг, узнавай что почитать, собирай визуальные подборки по жанрам, участвуй в книжных баттлах и получай ИИ-рекомендации." />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="msapplication-TileColor" content="#0a0a0a" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BookStrata" />
    <meta property="og:locale" content="ru_RU" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://smartcaptcha.yandexcloud.net https://mc.yandex.ru https://yastatic.net;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://smartcaptcha.yandexcloud.net;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https: blob:;
      frame-src https://smartcaptcha.yandexcloud.net https://mc.yandex.ru;
      connect-src 'self' https://smartcaptcha.yandexcloud.net https://api.telegram.org https://mc.yandex.ru wss://mc.yandex.ru https://*.ingest.sentry.io https://*.ingest.de.sentry.io https://s3.twcstorage.ru https://*.cdn.twcstorage.ru https://fonts.gstatic.com;
      worker-src 'self' blob:;
    ">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://re406cj9uj.cdn.twcstorage.ru" />
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Space+Grotesk:wght@500;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" crossorigin="anonymous" />

    <!-- Inline лоадер — виден сразу, пока React не загрузился и не заменил содержимое #root -->
    <style>
      #root-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0f172a;
        color: #94a3b8;
        font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
        padding: 1rem;
      }
      #root-loader .loader-logo {
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #d94f2b;
        margin-bottom: 1.5rem;
      }
      #root-loader .loader-spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(217, 79, 43, 0.2);
        border-top-color: #d94f2b;
        border-radius: 50%;
        animation: loader-spin 0.8s linear infinite;
      }
      @keyframes loader-spin {
        to { transform: rotate(360deg); }
      }
      #root-loader .loader-text {
        margin-top: 0.75rem;
        font-size: 0.8125rem;
        opacity: 0.6;
        animation: loader-pulse 1.5s ease-in-out infinite;
      }
      @keyframes loader-pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 0.3; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="root-loader">
        <div class="loader-logo">BookStrata</div>
        <div class="loader-spinner"></div>
        <div class="loader-text">Загрузка...</div>
      </div>
    </div>
    <script type="module" src="./src/app/main.tsx"></script>
  </body>
</html>
