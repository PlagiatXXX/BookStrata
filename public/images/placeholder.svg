<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect width="400" height="600" fill="url(#bg)"/>

  <!-- Контур книги (иконка) -->
  <g transform="translate(200, 230)">
    <rect x="-48" y="-64" width="96" height="128" rx="6" fill="url(#book)" stroke="#444" stroke-width="2"/>
    <rect x="-38" y="-54" width="76" height="108" rx="3" fill="#2a2a2a"/>
    <line x1="-24" y1="-36" x2="24" y2="-36" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-24" y1="-18" x2="24" y2="-18" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-24" y1="0" x2="24" y2="0" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-24" y1="18" x2="24" y2="18" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Логотип -->
  <text x="200" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="#e2e8f0" text-anchor="middle" letter-spacing="3">BOOKSTRATA</text>

  <!-- Рамка -->
  <rect x="16" y="16" width="368" height="568" rx="8" fill="none" stroke="#333" stroke-width="1.5"/>
</svg>
