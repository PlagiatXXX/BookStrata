<svg
  width="260"
  height="64"
  viewBox="0 0 260 64"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- ICON -->
  <g transform="translate(16,14)">
    <!-- Top tier -->
    <rect x="0" y="0" width="48" height="8" rx="4" fill="#8B7CFF">
      <animateTransform
        attributeName="transform"
        type="scale"
        values="1;1.08;1"
        dur="2.4s"
        repeatCount="indefinite"
      />
      <animate
        attributeName="opacity"
        values="0.9;1;0.9"
        dur="2.4s"
        repeatCount="indefinite"
      />
    </rect>

    <!-- Middle tier -->
    <rect x="0" y="14" width="36" height="8" rx="4" fill="#6D5DF6">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0;4 0;0 0"
        dur="2.4s"
        begin="0.2s"
        repeatCount="indefinite"
      />
      <animate
        attributeName="opacity"
        values="0.75;0.95;0.75"
        dur="2.4s"
        begin="0.2s"
        repeatCount="indefinite"
      />
    </rect>

    <!-- Bottom tier -->
    <rect x="0" y="28" width="24" height="8" rx="4" fill="#4C3FFF">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0;2 0;0 0"
        dur="2.4s"
        begin="0.4s"
        repeatCount="indefinite"
      />
      <animate
        attributeName="opacity"
        values="0.6;0.85;0.6"
        dur="2.4s"
        begin="0.4s"
        repeatCount="indefinite"
      />
    </rect>
  </g>

  <!-- TEXT -->
  <text
    x="92"
    y="38"
    font-size="22"
    font-family="Inter, system-ui, sans-serif"
    font-weight="600"
    fill="#F2F2F2"
    letter-spacing="0.5"
  >
    BookStrata
  </text>
</svg>
